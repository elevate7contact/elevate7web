    {
      "@context": "https://schema.org",

        {
          "@type": "Question",
          "name": "¿Cómo sé si la IA realmente puede ayudar a mi negocio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Si en tu operación hay tareas que se repiten, procesos que dependen de que una persona esté disponible, o trabajo manual que consume horas sin agregar valor real — la IA puede resolverlo. En el diagnóstico gratuito te decimos exactamente cuáles y cómo."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué herramientas de IA usan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Usamos las más sólidas del mercado según el problema: n8n y Make para automatizaciones; Claude API y GPT-4 para agentes de IA; ElevenLabs para voz; HeyGen para video. No usamos lo que está de moda — usamos lo que resuelve el dolor específico de tu negocio."
          }
        },
        {
          "@type": "Question",
          "name": "¿Necesito saber de tecnología para trabajar con ustedes?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Tú describes el problema — nosotros construimos la solución. Te entregamos sistemas que funcionan solos sin que necesites entender el código ni la tecnología detrás. Si algo falla, lo arreglamos nosotros."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto cuesta implementar IA en mi negocio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El diagnóstico es completamente gratis. Si decidimos trabajar juntos, construimos una propuesta según el problema concreto que quieres resolver. Sin paquetes genéricos, sin precios escondidos — el primer número que escuchas es el número real."
          }
        },
        {
          "@type": "Question",
          "name": "¿En qué problemas se especializan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "En tres dolores principales: operaciones que dependen de trabajo manual repetitivo, producción de contenido que consume demasiado tiempo, y procesos de atención o seguimiento que se pierden por falta de capacidad humana. Si tu problema entra en alguno de esos — podemos resolverlo."
          }
        },
        {
          "@type": "Question",
          "name": "¿Y si implementan algo que luego no funciona o nadie mantiene?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Es uno de los dolores más comunes con la IA: se implementa, nadie la mantiene y deja de funcionar. Por eso ofrecemos retainer mensual donde somos el equipo permanente que mantiene, ajusta y mejora tu infraestructura de IA mes a mes."
          }
        }
      ]
